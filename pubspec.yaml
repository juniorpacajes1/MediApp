name: mediapp_pro
description: Aplicacion profesional de gestion y agendamiento de citas medicas
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  provider: ^6.1.2
  intl: ^0.19.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  pdf: ^3.10.8
  path_provider: ^2.1.2
  share_plus: ^7.2.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  table_calendar: ^3.1.1
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/